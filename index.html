<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share-A-Doc 公共论坛</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Share-A-Doc</h1>
        <div id="auth-section">
            <button id="login-btn">使用 Google 登录</button>
            <div id="user-display" class="hidden">
                <span id="user-name"></span>
                <button id="logout-btn">退出</button>
            </div>
        </div>
    </nav>

    <main>
        <section id="editor-section" class="hidden">
            <h2>发布新文档</h2>
            <input type="text" id="doc-title" placeholder="请输入标题...">
            <textarea id="doc-content" placeholder="在此输入内容..."></textarea>
            <button id="post-btn">发布到论坛</button>
        </section>

        <section id="feed-section">
            <h2>所有文档</h2>
            <div id="doc-container">加载中...</div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
