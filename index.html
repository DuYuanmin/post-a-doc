<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share-A-Doc | Public Forum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>Share-A-Doc</h1>
        <div id="auth-section">
            <button id="login-btn">Login with Google</button>
            <span id="user-info" class="hidden"></span>
            <button id="logout-btn" class="hidden">Logout</button>
        </div>
    </nav>

    <main>
        <section id="editor-section" class="hidden">
            <h2>Create a New Document</h2>
            <input type="text" id="doc-title" placeholder="Title">
            <textarea id="doc-content" placeholder="Write your thoughts here..."></textarea>
            <button id="post-btn">Post Document</button>
        </section>

        <section id="feed-section">
            <h2>Public Documents</h2>
            <div id="doc-container">
                </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
