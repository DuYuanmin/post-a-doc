<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share-A-Doc/title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Share-A-Doc</h1>
        <div id="auth-section">
            <button id="login-btn"> Google</button>
            <div id="user-display" class="hidden">
                <span id="user-name"></span>
                <button id="logout-btn">exit</button>
            </div>
        </div>
    </nav>

    <main>
        <section id="editor-section" class="hidden">
            <h2>post</h2>
            <input type="text" id="doc-title" placeholder="...">
            <textarea id="doc-content" placeholder="type here..."></textarea>
            <button id="post-btn">post to the forum</button>
        </section>

        <section id="feed-section">
            <h2>all docs</h2>
            <div id="doc-container">laoding...</div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
